spring:
  application:
    name: plugin-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neohub}
    username: ${SPRING_DATASOURCE_USERNAME:neohub}
    password: ${SPRING_DATASOURCE_PASSWORD:neohub_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:neohub_dev}
  devtools:
    restart:
      enabled: true

server:
  port: ${SERVER_PORT:8081}

springdoc:
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    dev.neohub: DEBUG
