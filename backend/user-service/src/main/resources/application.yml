spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neohub}
    username: ${SPRING_DATASOURCE_USERNAME:neohub}
    password: ${SPRING_DATASOURCE_PASSWORD:neohub_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  devtools:
    restart:
      enabled: true

server:
  port: ${SERVER_PORT:8082}

jwt:
  secret: ${JWT_SECRET:dev_jwt_secret_change_in_production_min_32_chars}
  expiration: 86400000
  refresh-expiration: 604800000

github:
  client-id: ${GITHUB_CLIENT_ID:your_github_client_id}
  client-secret: ${GITHUB_CLIENT_SECRET:your_github_client_secret}
  redirect-uri: http://localhost:4200/auth/callback

springdoc:
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    dev.neohub: DEBUG
