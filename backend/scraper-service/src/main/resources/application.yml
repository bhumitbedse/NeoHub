spring:
  application:
    name: scraper-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neohub}
    username: ${SPRING_DATASOURCE_USERNAME:neohub}
    password: ${SPRING_DATASOURCE_PASSWORD:neohub_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  devtools:
    restart:
      enabled: true

server:
  port: ${SERVER_PORT:8083}

github:
  token: ${GITHUB_TOKEN:your_github_pat_token}
  api-url: https://api.github.com
  scrape-cron: "0 0 2 * * *"   # runs every day at 2 AM

springdoc:
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    dev.neohub: DEBUG
