spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neohub}
    username: ${SPRING_DATASOURCE_USERNAME:neohub}
    password: ${SPRING_DATASOURCE_PASSWORD:neohub_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate          # schema managed by init.sql
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:neohub_dev}
      timeout: 2000ms

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# JWT config
jwt:
  secret: ${JWT_SECRET:dev_jwt_secret_change_in_production_min_32_chars}
  expiration: 86400000       # 24 hours in ms
  refresh-expiration: 604800000  # 7 days in ms

# GitHub OAuth
github:
  client-id: ${GITHUB_CLIENT_ID:your_github_client_id}
  client-secret: ${GITHUB_CLIENT_SECRET:your_github_client_secret}
  redirect-uri: http://localhost:4200/auth/callback

# Internal service URLs
services:
  plugin: ${PLUGIN_SERVICE_URL:http://localhost:8081}
  user: ${USER_SERVICE_URL:http://localhost:8082}
  scraper: ${SCRAPER_SERVICE_URL:http://localhost:8083}

# Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method

# Logging
logging:
  level:
    dev.neohub: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
