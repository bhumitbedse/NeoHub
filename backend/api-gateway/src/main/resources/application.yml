spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns:
              - "http://localhost:4200"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-github
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/auth/github

        - id: auth-me
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/auth/me

        - id: plugin-search
          uri: ${PLUGIN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/plugins/search

        - id: plugin-colorschemes
          uri: ${PLUGIN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/plugins/colorschemes

        - id: plugins-list
          uri: ${PLUGIN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/plugins

        - id: plugin-detail
          uri: ${PLUGIN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/plugins/{slug}

        - id: categories
          uri: ${PLUGIN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/categories

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev_jwt_secret_change_in_production_min_32_chars}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    dev.neohub: DEBUG
