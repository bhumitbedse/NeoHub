version: "3.9"

services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
    volumes:
      - ../:/workspace:cached
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
    command: sleep infinity
    environment:
      - DISPLAY=${DISPLAY:-}
    network_mode: service:postgres
    depends_on:
      - postgres
      - redis
